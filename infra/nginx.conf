server {
    listen 80;
    server_name _;
    types {
        include /etc/nginx/mime.types;
        application/wasm wasm;
        application/octet-stream clr;
        application/octet-stream pdb;
        application/octet-stream dll;
        application/octet-stream dat;
        application/octet-stream blat;
    }

    root /usr/share/nginx/html;
    index index.html;

    # Compression (Gzip)
    gzip on;
    gzip_static on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/wasm;

    # 🔥 Blazor framework files (ESSENCIAL)
    location ^~ /_framework/ {
        gzip_static on;
        try_files $uri =404;
    }

    # 🔥 Blazor content files
    location ^~ /_content/ {
        gzip_static on;
        try_files $uri =404;
    }

    # 🔥 Arquivos estáticos gerais
    location ~* \.(js|wasm|css|png|jpg|jpeg|gif|ico|json)$ {
        gzip_static on;
        try_files $uri =404;
    }

    # 🔥 SPA fallback (Blazor)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream_backend backend;
        proxy_pass http://$upstream_backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy docs
    location ~* ^/(scalar|openapi)/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream_backend backend;
        proxy_pass http://$upstream_backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}