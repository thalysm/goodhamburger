server {
    listen 80;
    server_name _;
    include /etc/nginx/mime.types;

    root /usr/share/nginx/html;
    index index.html;

    # 🔥 Arquivos do Blazor (ESSENCIAL)
    location /_framework/ {
        try_files $uri =404;
    }

    location /_content/ {
        try_files $uri =404;
    }

    # 🔥 Arquivos estáticos
    location ~* \.(js|wasm|css|png|jpg|jpeg|gif|ico|json)$ {
        try_files $uri =404;
    }

    # 🔥 SPA fallback (Blazor)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream_backend backend;
        proxy_pass http://$upstream_backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy docs
    location ~* ^/(scalar|openapi)/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream_backend backend;
        proxy_pass http://$upstream_backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}