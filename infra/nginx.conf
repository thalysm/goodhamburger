server {
    listen 80;
    server_name _;
    include /etc/nginx/mime.types;

    location / {
        root /usr/share/nginx/html;
        # Não redirecionar arquivos de framework para o index.html se eles não existirem
        location ~* \.(js|wasm|css|png|jpg|jpeg|gif|ico|json)$ {
            try_files $uri =404;
        }
        try_files $uri $uri/ /index.html =404;
    }

    # Proxy para o Backend API
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream_backend backend;
        proxy_pass http://$upstream_backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy para Scalar e OpenAPI
    location ~* ^/(scalar|openapi)/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream_backend backend;
        proxy_pass http://$upstream_backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
